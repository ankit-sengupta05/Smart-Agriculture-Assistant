repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.5.0
  hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-added-large-files
      args: ["--maxkb=1000"]
    - id: check-yaml
    - id: check-json
    - id: check-merge-conflict
    - id: detect-private-key
    - id: no-commit-to-branch
      args: ["--branch", "production"]

- repo: https://github.com/pycqa/flake8
  rev: 7.0.0
  hooks:
    - id: flake8
      args: ["--max-line-length=100"]
      files: \.py$
      exclude: ^(venv|env|\.git)/

- repo: https://github.com/codespell-project/codespell
  rev: v2.2.2
  hooks:
    - id: codespell
      exclude: ^(package-lock\.json|yarn\.lock|\.expo/)
      args: ["--skip=*.lock,*.min.js,*.json"]

- repo: local
  hooks:
    - id: mask-secrets
      name: Mask secrets in staged files
      entry: python scripts/mask_keys.py
      language: system
      pass_filenames: true
      types: [text]
      exclude: >-
        (?x)^(
          scripts/mask_keys\.py|
          \.pre-commit-config\.yaml|
          .*\.lock|.*\.png|.*\.jpg|
          .*\.svg|.*\.exe|.*\.bin
        )$

    - id: compile-check
      name: Syntax and compile check (auto language detection)
      entry: python scripts/compile_check.py
      language: system
      pass_filenames: true
      types: [text]
      exclude: >-
        (?x)^(
          .*\.lock|.*\.md|.*\.txt|
          .*\.png|.*\.jpg|.*\.svg|
          .*\.json|.*\.yaml|.*\.yml|
          .*\.env.*|.*\.gitignore|
          .*\.css|.*\.scss|.*\.html
        )$

    - id: check-requirements
      name: Check requirements file syntax
      entry: python scripts/check_requirements.py
      language: system
      pass_filenames: false
      files: ^requirements\.txt$
